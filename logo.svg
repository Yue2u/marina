<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Marina logo">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1f2e"/>
      <stop offset="0.62" stop-color="#103a4a"/>
      <stop offset="1" stop-color="#1a5266"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#114050"/>
      <stop offset="1" stop-color="#08212d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9b0" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#ffd877" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffd877" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="badge"><circle cx="120" cy="120" r="110"/></clipPath>
    <clipPath id="towerClip"><path d="M118 156 L150 156 L144 88 L124 88 Z"/></clipPath>
  </defs>

  <g clip-path="url(#badge)">
    <rect x="0" y="0" width="240" height="240" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#cfe8f0">
      <circle cx="44" cy="46" r="1.3" opacity="0.8"/>
      <circle cx="72" cy="30" r="1" opacity="0.6"/>
      <circle cx="102" cy="52" r="1.1" opacity="0.7"/>
      <circle cx="150" cy="34" r="1" opacity="0.6"/>
      <circle cx="186" cy="58" r="1.2" opacity="0.7"/>
      <circle cx="206" cy="92" r="1" opacity="0.5"/>
      <circle cx="30" cy="100" r="1" opacity="0.5"/>
    </g>
    <!-- moon -->
    <circle cx="58" cy="62" r="14" fill="#dce9ef" opacity="0.16"/>
    <circle cx="58" cy="62" r="9" fill="#eef4f7" opacity="0.5"/>

    <!-- beacon beams -->
    <polygon points="134,72 22,42 46,112" fill="#ffe6ad" opacity="0.15"/>
    <polygon points="134,72 222,54 216,122" fill="#ffe6ad" opacity="0.11"/>

    <!-- water -->
    <rect x="0" y="150" width="240" height="90" fill="url(#water)"/>
    <g stroke="#2a8197" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
      <path d="M16 170 q 12 -6 24 0 t 24 0 t 24 0"/>
      <path d="M150 184 q 12 -6 24 0 t 24 0 t 24 0"/>
      <path d="M40 202 q 14 -6 28 0 t 28 0 t 28 0"/>
    </g>

    <!-- beacon reflection on water -->
    <g fill="#ffd877">
      <rect x="131" y="156" width="6" height="6" rx="3" opacity="0.5"/>
      <rect x="129" y="168" width="10" height="4" rx="2" opacity="0.35"/>
      <rect x="126" y="182" width="16" height="4" rx="2" opacity="0.22"/>
      <rect x="123" y="196" width="22" height="4" rx="2" opacity="0.13"/>
    </g>

    <!-- headland -->
    <path d="M96 156 q 38 -16 72 0 l 0 12 l -72 0 z" fill="#091f29"/>

    <!-- moored boats -->
    <g transform="translate(58,150)">
      <path d="M-12 0 L12 0 L8 7 L-8 7 Z" fill="#0c2d3a"/>
      <line x1="0" y1="0" x2="0" y2="-13" stroke="#6fb3c4" stroke-width="1.4"/>
      <path d="M0 -12 L7 -3 L0 -3 Z" fill="#6fb3c4" opacity="0.85"/>
    </g>
    <g transform="translate(90,158) scale(0.8)">
      <path d="M-12 0 L12 0 L8 7 L-8 7 Z" fill="#0a2530"/>
      <line x1="0" y1="0" x2="0" y2="-13" stroke="#5a9aab" stroke-width="1.4"/>
      <path d="M0 -12 L-7 -3 L0 -3 Z" fill="#5a9aab" opacity="0.7"/>
    </g>

    <!-- lighthouse -->
    <path d="M118 156 L150 156 L144 88 L124 88 Z" fill="#f2ede2"/>
    <g clip-path="url(#towerClip)">
      <rect x="116" y="88" width="36" height="12" fill="#d9544a"/>
      <rect x="116" y="112" width="36" height="12" fill="#d9544a"/>
      <rect x="116" y="136" width="36" height="12" fill="#d9544a"/>
    </g>
    <path d="M118 156 L150 156 L144 88 L124 88 Z" fill="none" stroke="#0a1f2e" stroke-width="1.5" opacity="0.22"/>
    <rect x="120" y="82" width="28" height="7" rx="2" fill="#16404f"/>
    <rect x="126" y="66" width="16" height="17" rx="1.5" fill="#173f4d"/>
    <circle cx="134" cy="74" r="20" fill="url(#glow)"/>
    <rect x="130" y="70" width="8" height="9" rx="1" fill="#ffe9b0"/>
    <path d="M123 66 L145 66 L134 54 Z" fill="#11333f"/>
    <line x1="134" y1="54" x2="134" y2="48" stroke="#11333f" stroke-width="2"/>
    <circle cx="134" cy="47" r="2" fill="#ffd877"/>
  </g>

  <circle cx="120" cy="120" r="110" fill="none" stroke="#246b80" stroke-width="3"/>
  <circle cx="120" cy="120" r="104" fill="none" stroke="#9fd0dc" stroke-width="1" opacity="0.25"/>
</svg>
