services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marina
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: marina_sync
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marina -d marina_sync"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  marina-sync:
    build:
      context: .
      args:
        TAGS: postgres
    ports:
      - "${MARINA_PORT:-8443}:8443"
    command: >
      serve
      --addr :8443
      --db-driver pgx
      --db-dsn postgres://marina:${POSTGRES_PASSWORD}@postgres/marina_sync?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
